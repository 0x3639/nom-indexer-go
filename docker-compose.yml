services:
  postgres:
    image: postgres:16-alpine
    container_name: nom-indexer-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (copy .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-nom_indexer}
    volumes:
      - ./data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nom-indexer

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nom-indexer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_URL_WS: ${NODE_URL_WS:-wss://test.hc1node.com}
      DATABASE_ADDRESS: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-nom_indexer}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (copy .env.example)}
      MIGRATIONS_PATH: /app/migrations
      BACKFILL_ON_STARTUP: ${BACKFILL_ON_STARTUP:-false}
    restart: unless-stopped
    networks:
      - nom-indexer

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nom-indexer-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_ADDRESS: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-nom_indexer}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (copy .env.example)}
      API_PORT: ${API_PORT:-8080}
      API_METRICS_PORT: ${API_METRICS_PORT:-9090}
      API_JWT_SECRET: ${API_JWT_SECRET:?set API_JWT_SECRET in .env — admin issues tokens via cmd/jwt-issue}
      API_CORS_ALLOWED_ORIGINS: ${API_CORS_ALLOWED_ORIGINS:-}
      API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-60}
    ports:
      - "${API_PORT:-8080}:8080"
      - "${API_METRICS_PORT:-9090}:9090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz | grep -q ok || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - nom-indexer

networks:
  nom-indexer:
    driver: bridge
