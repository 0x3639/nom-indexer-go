services:
  postgres:
    image: postgres:16-alpine
    container_name: nom-indexer-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (copy .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-nom_indexer}
    volumes:
      - ./data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nom-indexer

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nom-indexer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_URL_WS: ${NODE_URL_WS:-wss://test.hc1node.com}
      DATABASE_ADDRESS: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-nom_indexer}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (copy .env.example)}
      MIGRATIONS_PATH: /app/migrations
      BACKFILL_ON_STARTUP: ${BACKFILL_ON_STARTUP:-false}
    restart: unless-stopped
    networks:
      - nom-indexer

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nom-indexer-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_ADDRESS: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-nom_indexer}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (copy .env.example)}
      API_PORT: ${API_PORT:-8080}
      API_METRICS_PORT: ${API_METRICS_PORT:-9090}
      # Required by the API container. Left interpolated (not :?-required)
      # so `docker compose up` for indexer-only stacks does not fail at
      # interpolation time. cmd/api refuses to start if empty.
      API_JWT_SECRET: ${API_JWT_SECRET:-}
      API_CORS_ALLOWED_ORIGINS: ${API_CORS_ALLOWED_ORIGINS:-}
      API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-60}
    ports:
      # Container listens on whatever API_PORT / API_METRICS_PORT is set
      # to (cmd/api reads the env vars), so host and container ports
      # must match — otherwise the published port silently routes to a
      # closed socket inside the container.
      - "${API_PORT:-8080}:${API_PORT:-8080}"
      - "${API_METRICS_PORT:-9090}:${API_METRICS_PORT:-9090}"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- "http://localhost:${API_PORT:-8080}/healthz" | grep -q ok || exit 1
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - nom-indexer

  # Hosted MCP server. Speaks Model Context Protocol over Streamable HTTP
  # so remote AI agents (Claude Desktop, Claude Code, etc.) can query the
  # same Postgres tables the REST API serves. Auth uses the same HS256
  # JWT secret as the API by default; set MCP_JWT_SECRET to isolate.
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: nom-indexer-mcp
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_ADDRESS: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-nom_indexer}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (copy .env.example)}
      MCP_PORT: ${MCP_PORT:-8081}
      MCP_METRICS_PORT: ${MCP_METRICS_PORT:-9091}
      # Same fallback chain as cmd/mcp: prefer MCP_JWT_SECRET, fall
      # back to API_JWT_SECRET. Container refuses to start if both empty.
      API_JWT_SECRET: ${API_JWT_SECRET:-}
      MCP_JWT_SECRET: ${MCP_JWT_SECRET:-}
      MCP_CORS_ALLOWED_ORIGINS: ${MCP_CORS_ALLOWED_ORIGINS:-}
      MCP_RATE_LIMIT_PER_MINUTE: ${MCP_RATE_LIMIT_PER_MINUTE:-60}
    ports:
      - "${MCP_PORT:-8081}:${MCP_PORT:-8081}"
      - "${MCP_METRICS_PORT:-9091}:${MCP_METRICS_PORT:-9091}"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O- "http://localhost:${MCP_PORT:-8081}/healthz" | grep -q ok || exit 1
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - nom-indexer

networks:
  nom-indexer:
    driver: bridge
