name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dagger/dagger-for-github@v7
        with:
          version: "0.19.8"
          verb: call
          args: ci --source=.

  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: ci
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Indexer image — ghcr.io/0x3639/nom-indexer-go:<tag>
      - name: Publish indexer with SHA tag (main branch)
        if: github.ref == 'refs/heads/main'
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.19.8"
          verb: call
          args: publish --source=. --tag=${{ github.sha }}
      - name: Publish indexer with version tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.19.8"
          verb: call
          args: publish --source=. --tag=${{ github.ref_name }}
      - name: Publish indexer latest tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.19.8"
          verb: call
          args: publish --source=. --tag=latest

      # API image — ghcr.io/0x3639/nom-indexer-api:<tag>. Separate
      # repository path so consumers can pull just the API without the
      # CGO-heavy indexer image, and so operators can pin the two to
      # different SHAs during a rolling deploy.
      - name: Publish API with SHA tag (main branch)
        if: github.ref == 'refs/heads/main'
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.19.8"
          verb: call
          args: publish-api --source=. --tag=${{ github.sha }}
      - name: Publish API with version tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.19.8"
          verb: call
          args: publish-api --source=. --tag=${{ github.ref_name }}
      - name: Publish API latest tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.19.8"
          verb: call
          args: publish-api --source=. --tag=latest
