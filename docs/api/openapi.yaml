openapi: 3.1.0

info:
  title: nom-indexer-go API
  version: 0.1.0
  description: |
    Read-only HTTP API over the nom-indexer-go database. Schema-as-contract:
    every response mirrors the underlying Postgres table layout documented at
    https://0x3639.github.io/nom-indexer-go/schema/.

    ## Authentication

    All endpoints under `/api/v1/` require a Bearer JWT in the `Authorization`
    header. Tokens are HS256-signed by an admin via `cmd/jwt-issue`; there is
    no token-mint endpoint. See https://0x3639.github.io/nom-indexer-go/api/auth/.

    ## Pagination

    Collection endpoints use offset/limit (`?page=1&page_size=50`, max 200) and
    return an envelope `{data: [...], pagination: {page, page_size, total}}`.
    Single-item endpoints return the object directly.

    ## Errors

    Errors are returned as `application/problem+json` (RFC 7807) with a
    JSON object carrying `type`, `title`, `status`, `detail`, and a
    custom `code` field.
  contact:
    name: nom-indexer-go
    url: https://github.com/0x3639/nom-indexer-go
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://localhost:8080
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HS256-signed JWT minted via `cmd/jwt-issue`. Carries `sub`, `exp`, `iat`,
        and an OAuth 2.0 space-separated `scope` claim.

  parameters:
    PageParam:
      name: page
      in: query
      description: 1-based page number. Defaults to 1. Out-of-range clamped silently.
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
        examples: [1]
    PageSizeParam:
      name: page_size
      in: query
      description: Items per page. Default 50, maximum 200. Out-of-range clamped silently.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
        examples: [50]
    SortParam:
      name: sort
      in: query
      description: Sort direction over the endpoint's documented sort column. Defaults vary per endpoint.
      required: false
      schema:
        type: string
        enum: [asc, desc]

  schemas:
    Problem:
      type: object
      description: RFC 7807 problem details.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: A URI reference identifying the problem type.
          examples: ["about:blank"]
        title:
          type: string
          description: A short, human-readable summary.
          examples: ["Unauthorized"]
        status:
          type: integer
          format: int32
          examples: [401]
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: A URI reference identifying the specific occurrence.
        code:
          type: string
          description: Stable application-level error code (extension).
          examples: ["unauthorized"]

    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    Pagination:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
          examples: [1]
        page_size:
          type: integer
          examples: [50]
        total:
          type: integer
          format: int64
          description: Total rows matching the query across all pages.
          examples: [12345]

    Status:
      type: object
      description: Indexer sync state derived from the database.
      required: [latest_height, latest_timestamp, indexer_lag_seconds, version]
      properties:
        latest_height:
          type: integer
          format: int64
          minimum: 0
          description: Height of the most-recently-indexed momentum (0 if empty).
          examples: [12345]
        latest_timestamp:
          type: integer
          format: int64
          description: Unix-seconds timestamp of the latest momentum.
          examples: [1700000000]
        indexer_lag_seconds:
          type: integer
          format: int64
          description: Server clock minus latest_timestamp. Grows when the indexer falls behind.
          examples: [5]
        version:
          type: string
          examples: ["dev"]

    Momentum:
      type: object
      required: [height, hash, timestamp, tx_count, producer]
      properties:
        height:
          type: integer
          format: int64
          minimum: 0
          examples: [12345]
        hash:
          type: string
          examples: ["6b4a32ff…"]
        timestamp:
          type: integer
          format: int64
          examples: [1700000000]
        tx_count:
          type: integer
          examples: [3]
        producer:
          type: string
          examples: ["z1qq…"]
        producer_owner:
          type: string
        producer_name:
          type: string

    MomentumList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Momentum'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Amount:
      type: string
      description: |
        Raw int64 token amount (no decimals applied) serialized as a
        JSON string. Strings avoid JavaScript Number precision loss for
        values above 2^53-1 — ZNN total supply already exceeds that.
      pattern: '^-?[0-9]+$'
      examples: ["100000000000"]

    Account:
      type: object
      required:
        - address
        - block_count
        - genesis_znn_balance
        - genesis_qsr_balance
        - znn_sent
        - znn_received
        - qsr_sent
        - qsr_received
      properties:
        address: { type: string }
        block_count: { type: integer, format: int64 }
        public_key: { type: string }
        delegate: { type: string }
        delegation_start_timestamp: { type: integer, format: int64 }
        genesis_znn_balance: { $ref: '#/components/schemas/Amount' }
        genesis_qsr_balance: { $ref: '#/components/schemas/Amount' }
        znn_sent: { $ref: '#/components/schemas/Amount' }
        znn_received: { $ref: '#/components/schemas/Amount' }
        qsr_sent: { $ref: '#/components/schemas/Amount' }
        qsr_received: { $ref: '#/components/schemas/Amount' }
        first_active_at: { type: integer, format: int64 }
        last_active_at: { type: integer, format: int64 }

    Balance:
      type: object
      required: [address, token_standard, balance, last_updated_timestamp]
      properties:
        address: { type: string }
        token_standard: { type: string }
        balance: { $ref: '#/components/schemas/Amount' }
        last_updated_timestamp: { type: integer, format: int64 }

    BalanceList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Balance'

    BalancePage:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Balance'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Token:
      type: object
      required:
        - token_standard
        - name
        - symbol
        - decimals
        - owner
        - total_supply
        - max_supply
        - is_burnable
        - is_mintable
        - is_utility
        - total_burned
        - last_update_timestamp
        - holder_count
        - transaction_count
      properties:
        token_standard: { type: string, examples: ["zts1znnxxxxxxxxxxxxx9z4ulx"] }
        name: { type: string }
        symbol: { type: string }
        domain: { type: string }
        decimals: { type: integer }
        owner: { type: string }
        total_supply: { $ref: '#/components/schemas/Amount' }
        max_supply: { $ref: '#/components/schemas/Amount' }
        is_burnable: { type: boolean }
        is_mintable: { type: boolean }
        is_utility: { type: boolean }
        total_burned: { $ref: '#/components/schemas/Amount' }
        last_update_timestamp: { type: integer, format: int64 }
        holder_count: { type: integer, format: int64 }
        transaction_count: { type: integer, format: int64 }

    AccountBlock:
      type: object
      description: |
        A transaction (account-block in Zenon's dual-ledger model). One
        block is either a send (block_type 1..4) or a receive (5..8); a
        complete transaction is the matched (send, receive) pair.
      required:
        - hash
        - momentum_hash
        - momentum_timestamp
        - momentum_height
        - block_type
        - height
        - address
        - amount
      properties:
        hash: { type: string }
        momentum_hash: { type: string }
        momentum_timestamp: { type: integer, format: int64 }
        momentum_height: { type: integer, format: int64 }
        block_type: { type: integer, examples: [2] }
        height: { type: integer, format: int64 }
        address: { type: string }
        to_address: { type: string }
        amount: { $ref: '#/components/schemas/Amount' }
        token_standard: { type: string }
        data: { type: string }
        method: { type: string }
        input:
          description: Decoded contract inputs (JSON object) when the indexer recognized the method.
          type: object
          additionalProperties: { type: string }
        paired_account_block: { type: string }
        descendant_of: { type: string }

    Pillar:
      type: object
      required:
        - owner_address
        - producer_address
        - withdraw_address
        - name
        - rank
        - is_revocable
        - weight
        - slot_cost_qsr
        - is_revoked
      properties:
        owner_address: { type: string }
        producer_address: { type: string }
        withdraw_address: { type: string }
        name: { type: string }
        rank: { type: integer }
        give_momentum_reward_percentage: { type: integer }
        give_delegate_reward_percentage: { type: integer }
        is_revocable: { type: boolean }
        revoke_cooldown: { type: integer }
        revoke_timestamp: { type: integer, format: int64 }
        weight: { $ref: '#/components/schemas/Amount' }
        epoch_produced_momentums: { type: integer }
        epoch_expected_momentums: { type: integer }
        slot_cost_qsr: { $ref: '#/components/schemas/Amount' }
        spawn_timestamp: { type: integer, format: int64 }
        voting_activity: { type: number, format: float }
        produced_momentum_count: { type: integer, format: int64 }
        is_revoked: { type: boolean }

    PillarList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Pillar'
        pagination:
          $ref: '#/components/schemas/Pagination'

    PillarDelegator:
      type: object
      required: [address, delegation_start_timestamp]
      properties:
        address: { type: string }
        delegation_start_timestamp: { type: integer, format: int64 }

    PillarDelegatorList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PillarDelegator'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Sentinel:
      type: object
      required: [owner, registration_timestamp, is_revocable, active]
      properties:
        owner: { type: string }
        registration_timestamp: { type: integer, format: int64 }
        is_revocable: { type: boolean }
        revoke_cooldown: { type: string }
        active: { type: boolean }

    SentinelList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Sentinel'
        pagination:
          $ref: '#/components/schemas/Pagination'

    AccountBlockList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AccountBlock'
        pagination:
          $ref: '#/components/schemas/Pagination'

    TokenList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Token'
        pagination:
          $ref: '#/components/schemas/Pagination'

  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    RateLimited:
      description: Too many requests for this subject.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      description: |
        Always returns 200 with `{"status":"ok"}`. Does not check the
        database — that's `/readyz`. Suitable for k8s liveness checks.
      tags: [meta]
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /api/v1/status:
    get:
      operationId: getStatus
      summary: Indexer sync status
      description: |
        Returns the latest indexed momentum height, its timestamp, and
        `indexer_lag_seconds = now - latest_timestamp`. Computed from the
        database alone — does not hit the Zenon node.
      tags: [meta]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current sync state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/momentums:
    get:
      operationId: listMomentums
      summary: List momentums
      description: |
        Returns momentums ordered by height (default `desc`). Page through
        the full chain with `?page=` and `?page_size=`.
      tags: [momentums]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated list of momentums.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentumList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/momentums/latest:
    get:
      operationId: getLatestMomentum
      summary: Get the most-recently-indexed momentum
      description: |
        Returns the highest-height momentum. Returns 404 if the indexer
        has not processed any blocks yet.
      tags: [momentums]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The latest momentum.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Momentum'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No momentums have been indexed yet.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/accounts/{address}:
    get:
      operationId: getAccount
      summary: Get account info
      description: |
        Returns the account's flow metrics (lifetime ZNN/QSR sent/received,
        first/last activity) plus delegation state. Returns 404 if the
        indexer has never observed the address.
      tags: [accounts]
      security:
        - bearerAuth: []
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string, examples: ["z1qq…"] }
      responses:
        '200':
          description: Account info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No account with that address.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/accounts/{address}/balances:
    get:
      operationId: getAccountBalances
      summary: List balances for an account
      description: |
        Returns every (token_standard, balance) row for the address,
        sorted by balance DESC. Not paginated — an account typically
        holds a handful of tokens.
      tags: [accounts]
      security:
        - bearerAuth: []
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of balances.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/accounts/{address}/transactions:
    get:
      operationId: listAccountTransactions
      summary: List transactions involving an address
      description: |
        Returns account-blocks where the address is either sender or
        recipient. Sorted by momentum_height; default desc.
      tags: [accounts]
      security:
        - bearerAuth: []
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated list of account-blocks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBlockList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/account_blocks:
    get:
      operationId: listAccountBlocks
      summary: List account-blocks (transactions)
      tags: [account_blocks]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated list of account-blocks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBlockList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/account_blocks/{hash}:
    get:
      operationId: getAccountBlock
      summary: Get an account-block by hash
      tags: [account_blocks]
      security:
        - bearerAuth: []
      parameters:
        - name: hash
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The requested account-block.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBlock'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No account-block with that hash.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/tokens:
    get:
      operationId: listTokens
      summary: List ZTS tokens
      description: |
        Returns ZTS tokens ordered by holder_count DESC (most-held first),
        then token_standard ASC for stability.
      tags: [tokens]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/tokens/{token_standard}:
    get:
      operationId: getToken
      summary: Get a ZTS token by ZTS identifier
      tags: [tokens]
      security:
        - bearerAuth: []
      parameters:
        - name: token_standard
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Token info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No token with that standard.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/tokens/{token_standard}/holders:
    get:
      operationId: listTokenHolders
      summary: Richlist for a token
      description: |
        Returns addresses holding the token, sorted by balance DESC.
        Excludes zero balances.
      tags: [tokens]
      security:
        - bearerAuth: []
      parameters:
        - name: token_standard
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated holder list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalancePage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/pillars:
    get:
      operationId: listPillars
      summary: List pillars
      description: |
        Returns pillars ordered by rank ascending. Excludes revoked
        pillars by default; pass `?include_revoked=true` to include them.
      tags: [pillars]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: include_revoked
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Paginated list of pillars.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PillarList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/pillars/{name}:
    get:
      operationId: getPillar
      summary: Get a pillar by name
      tags: [pillars]
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The requested pillar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pillar'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No pillar with that name.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/pillars/{name}/delegators:
    get:
      operationId: listPillarDelegators
      summary: List delegators for a pillar
      description: |
        Returns the addresses currently delegated to the pillar, sorted
        by delegation_start_timestamp ASC (longest-tenured first).
      tags: [pillars]
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated delegator list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PillarDelegatorList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No pillar with that name.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/sentinels:
    get:
      operationId: listSentinels
      summary: List sentinels
      description: |
        Returns sentinels ordered by registration_timestamp DESC
        (newest first). Active sentinels only by default; pass
        `?include_inactive=true` to include retired sentinels.
      tags: [sentinels]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: include_inactive
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Paginated sentinel list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentinelList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/momentums/{height}:
    get:
      operationId: getMomentumByHeight
      summary: Get a momentum by height
      tags: [momentums]
      security:
        - bearerAuth: []
      parameters:
        - name: height
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 0
            examples: [12345]
      responses:
        '200':
          description: The requested momentum.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Momentum'
        '400':
          description: Height is not a non-negative integer.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No momentum exists at that height.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          $ref: '#/components/responses/RateLimited'
